<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>

      <link href="./output.css" rel="stylesheet">

      <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>

  <!-- Position  -->
<h1 class="mb-3">Position</h1>
<div class="relative w-1/2 h-40 bg-green-200">
  <p>Relative</p>
  <div class="absolute bottom-0 right-0 bg-teal-400 p-4">
    <p>Absolute</p>
  </div>
</div>

<div class="relative w-1/2 h-40 bg-green-200 mt-5">
  <p>Relative</p>
  <div class="absolute left-0 top-0 bg-teal-400 p-4">
    <p>Absolute</p>
  </div>
</div>

<div class="relative w-1/2 h-40 bg-green-200 mt-5">
  <p>Relative</p>
  <div class="absolute right-0 top-0 bg-teal-400 p-4">
    <p>Absolute</p>
  </div>
</div>

<div class="relative w-1/2 h-40 bg-green-200 mt-5">
  <p>Relative</p>
  <div class="absolute left-0 bottom-0 bg-teal-400 p-4">
    <p>Absolute</p>
  </div>
</div>


<!-- Display  -->
<h1 class="mb-3">Display</h1>

<div class="bg-indigo-300 p-10 mb-10 w-[800px]">
<span class="inline bg-orange-400 w-[600px]">1.This is display inline and will wrap normally</span>
<span class="inline-block bg-slate-700 w-[600px]">2.This is display inline-block</span>
<span class="inline-block">3.This is display block</span>
<span class="hidden">4.This is display hidden</span>
</div>

</body>
</html>
